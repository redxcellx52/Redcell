# ============================================================
# REDCELL AR-GE — Nginx Yapılandırması
# 6. HTTPS hazırlığı
# Dosya: /etc/nginx/sites-available/redxcell
# ============================================================

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    listen [::]:80;
    server_name redxcell.com www.redxcell.com;

    # Let's Encrypt doğrulama
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Diğer her şeyi HTTPS'e yönlendir
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name redxcell.com www.redxcell.com;

    # SSL Sertifikaları (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/redxcell.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/redxcell.com/privkey.pem;

    # Güçlü SSL ayarları
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # HSTS (6 ay)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

    # Güvenlik Header'ları (Nginx seviyesinde de ekle)
    add_header X-Frame-Options           "DENY"                always;
    add_header X-Content-Type-Options    "nosniff"             always;
    add_header X-XSS-Protection          "1; mode=block"       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Dosya boyutu limiti (büyük yük saldırısı önlemi)
    client_max_body_size 10M;

    # İstek hızı sınırı (Nginx seviyesinde)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Login endpoint özel sınır
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Genel API
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Service Worker — cache'siz servis edilmeli
    location /static/sw.js {
        proxy_pass         http://127.0.0.1:8080;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # Statik dosyalar
    location /static/ {
        proxy_pass         http://127.0.0.1:8080;
        expires            7d;
        add_header Cache-Control "public, immutable";
    }

    # Ana uygulama
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Gizli dosyalara erişimi engelle
    location ~ /\. {
        deny all;
        return 404;
    }

    # Log
    access_log /var/log/nginx/redxcell_access.log;
    error_log  /var/log/nginx/redxcell_error.log warn;
}
