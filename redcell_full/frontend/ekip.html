<html lang="tr">
<head>
<meta charset="UTF-8"/>

<title>REDCELL &#226; Ekip Paneli</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#c0392b;--red-d:#a93226;--bg:#0a0a0a;--bg2:#0f0f0f;--bg3:#141414;--line:#1a1a1a;--line2:#2a2a2a;--text:#e8e8e0;--muted:#888;--faint:#555;--green:#27ae60;--amber:#e67e22;--blue:#2980b9;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{width:360px;border:.5px solid var(--line2);padding:44px 36px}
.login-logo{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;letter-spacing:.15em;margin-bottom:8px}
.login-logo span{color:var(--red)}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:32px}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.field label{font-family:'Space Mono',monospace;font-size:10px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase}
.field input,.field select,.field textarea{background:var(--bg2);border:.5px solid var(--line2);color:var(--text);padding:10px 12px;font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;transition:border-color .2s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red)}
.field textarea{resize:vertical;min-height:90px;font-family:'Space Mono',monospace;font-size:12px}
.field select option{background:#1a1a1a}
.login-btn{width:100%;padding:13px;background:var(--red);color:#fff;border:none;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-top:8px}
.login-btn:hover{background:var(--red-d)}
.login-hint{font-size:11px;color:var(--faint);margin-top:14px;font-family:'Space Mono',monospace}

/* APP */
#app{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:.5px solid var(--line2);background:rgba(10,10,10,.97);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.top-logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.15em}
.top-logo span{color:var(--red)}
.top-r{display:flex;align-items:center;gap:10px}
.tbtn{font-family:'Space Mono',monospace;font-size:10px;padding:7px 14px;border:.5px solid var(--line2);color:var(--muted);background:none;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:all .2s}
.tbtn:hover{border-color:var(--muted);color:var(--text)}
.welcome-badge{font-family:'Space Mono',monospace;font-size:11px;color:var(--text)}
.welcome-badge span{color:var(--red)}

.main{max-width:1100px;margin:0 auto;padding:28px 24px}

/* PROFIL KARTI */
.profil-kart{background:var(--bg2);border:.5px solid var(--line2);padding:24px;display:flex;align-items:center;gap:20px;margin-bottom:24px}
.profil-avatar{width:56px;height:56px;background:var(--bg3);border:.5px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--red);flex-shrink:0}
.profil-ad{font-size:16px;font-weight:500;color:var(--text)}
.profil-rol{font-size:13px;color:var(--muted);margin-top:2px}
.profil-certs{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.cert-badge{font-family:'Space Mono',monospace;font-size:10px;padding:2px 8px;background:rgba(192,57,43,.08);color:var(--red);border:.5px solid rgba(192,57,43,.2)}
.durum-toggle{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.durum-select{font-family:'Space Mono',monospace;font-size:11px;padding:7px 12px;background:var(--bg3);border:.5px solid var(--line2);color:var(--text);cursor:pointer;outline:none}

/* STAT ROW */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);margin-bottom:24px}
.stat-c{background:var(--bg);padding:18px 16px}
.stat-c .n{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;line-height:1}
.stat-c .l{font-size:11px;color:var(--faint);margin-top:5px}
.c-red{color:var(--red)}.c-amber{color:var(--amber)}.c-blue{color:var(--blue)}.c-green{color:var(--green)}

/* SECTION */
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-head h2{font-size:14px;font-weight:500}
.sec{margin-bottom:28px}

/* G&#214;REV KARTI */
.gorev-kart{background:var(--bg);border:.5px solid var(--line2);margin-bottom:10px;overflow:hidden}
.gorev-head{padding:16px 18px;border-bottom:.5px solid var(--line);display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s}
.gorev-head:hover{background:var(--bg2)}
.gorev-musteri{font-size:14px;font-weight:500;color:var(--text)}
.gorev-hizmet{font-size:12px;color:var(--muted);margin-top:2px}
.gorev-body{display:none;padding:20px 18px;background:var(--bg2)}
.gorev-body.open{display:block}

/* &#304;LERLEME */
.ilerleme-wrap{margin-bottom:18px}
.ilerleme-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.ilerleme-bar{height:4px;background:var(--line2)}
.ilerleme-fill{height:100%;background:var(--green);transition:width .4s ease}
.ilerleme-input{width:100%;margin-top:6px}
input[type=range]{accent-color:var(--red);width:100%}

/* BADGE */
.badge{font-family:'Space Mono',monospace;font-size:10px;padding:3px 9px;letter-spacing:.06em}
.b-amber{background:rgba(230,126,34,.1);color:var(--amber);border:.5px solid rgba(230,126,34,.3)}
.b-blue{background:rgba(41,128,185,.1);color:var(--blue);border:.5px solid rgba(41,128,185,.3)}
.b-green{background:rgba(39,174,96,.1);color:var(--green);border:.5px solid rgba(39,174,96,.3)}
.b-red{background:rgba(192,57,43,.1);color:var(--red);border:.5px solid rgba(192,57,43,.3)}

/* AKSIYON BUTONLAR */
.aksiyon-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:.5px solid var(--line)}
.abtn{font-family:'Space Mono',monospace;font-size:10px;padding:8px 16px;border:.5px solid var(--line2);color:var(--muted);background:none;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:all .2s}
.abtn:hover{border-color:var(--muted);color:var(--text)}
.abtn.primary{background:var(--red);color:#fff;border-color:var(--red)}
.abtn.primary:hover{background:var(--red-d)}
.abtn.green{border-color:var(--green);color:var(--green)}
.abtn.green:hover{background:var(--green);color:#0a0a0a}

/* AI RAPOR */
.ai-box{background:var(--bg3);border:.5px solid var(--line2);padding:18px;margin-top:16px}
.ai-head{font-family:'Space Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ai-out{font-size:12px;color:var(--muted);line-height:1.8;white-space:pre-wrap;max-height:360px;overflow-y:auto}
@keyframes ai-p{0%,100%{opacity:.3}50%{opacity:1}}
.aidot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:ai-p 1s infinite;display:inline-block;margin:0 2px}
.aidot:nth-child(2){animation-delay:.2s}.aidot:nth-child(3){animation-delay:.4s}

/* BO&#350; */
.empty{text-align:center;padding:48px;color:var(--faint);font-size:13px}
.empty i{font-size:40px;display:block;margin-bottom:12px;color:var(--line2)}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;padding:11px 18px;font-family:'Space Mono',monospace;font-size:11px;z-index:9999;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* RAPOR &#214;N&#304;ZLEME */
.rapor-onizleme{background:#fff;color:#111;padding:40px;font-family:'Courier New',monospace;font-size:12px;line-height:1.8;max-height:500px;overflow-y:auto;margin-top:14px}
.rapor-onizleme h1{font-size:18px;margin-bottom:4px;color:#111}
.rapor-onizleme .red{color:#c0392b}
.rapor-onizleme hr{border:none;border-top:2px solid #c0392b;margin:16px 0}
.rapor-onizleme pre{white-space:pre-wrap;font-family:inherit}
</style>

<script src="/static/rc-api.js"></script>
</head>

<script>
const t3 = {id:'T003',ad:'Lojistik Grup',email:'it@lojistik.com',hizmet:'Sosyal M  hendislik',ozet:'  al    an fark  ndal  k testi ve phishing sim  lasyonu.',hedef:'   ',oncelik:'Normal (1-2 hafta)',kapsam:['Sosyal M  hendislik'],tarih:'2025-06-10',durum:'tamamlandi'};
    this.save('talepler',[t1,t2,t3]);
    this.save('gorevler',[
      {id:'G001',talepId:'T001',atananId:'U002',atananAd:'Ay  e Kaya',hizmet:'Web Uygulama G  venli  i',musteri:'Teknoloji A.  .',durum:'devam',notlar:'Login sayfas  nda SQL injection     phesi. /api/user endpoint kontrol edilecek.',bulgular:'[Y  KSEK] SQL Injection - /login?user= parametresi\n[ORTA] XSS - /search?q= parametresi\n[D      K] A    k X-Frame-Options header eksik',ilerleme:65,baslangicTarih:'2025-06-19'},
      {id:'G002',talepId:'T003',atananId:'U001',atananAd:'Mehmet Arslan',hizmet:'Sosyal M  hendislik',musteri:'Lojistik Grup',durum:'tamamlandi',notlar:'T  m testler tamamland  .',bulgular:'23/50   al    an phishing linkine t  klad  . 3 kullan  c   credentials girdi.',ilerleme:100,baslangicTarih:'2025-06-10',bitisTarih:'2025-06-14'},
    ]);
    this.bildirimEkle('talep','Yeni Talep','Teknoloji A.  .     Web Uygulama G  venli  i',{talepId:'T001'});
    this.bildirimEkle('sistem','     Atand  ','Web Uygulama G  venli  i     Ay  e Kaya',{talepId:'T001',atananId:'U002'});
    this.bildirimEkle('durum','Test Ba  lad  ','Finans Ltd.     A   S  zma Testi bekliyor',{talepId:'T002'});
    this.bildirimEkle('rapor','Rapor Haz  r','Lojistik Grup     Sosyal M  hendislik',{talepId:'T003'});
  }
};



const RC = {

  firma: {
    ad: 'REDCELL AR-GE',
    slogan: 'Ofansif Guvenlik & Arastirma',
    adres: 'Istanbul, Turkiye',
    telefon: '+90 212 000 00 00',
    eposta: 'info@redcell.com.tr',
    web: 'www.redcell.com.tr',
    gizlilik: 'Bu rapor yalnizca aliciya ozeldir. Izinsiz kopyalanamaz veya dagitulamaz.',
    yasal: 'REDCELL AR-GE yalnizca yetkili sistemler uzerinde test gerceklestirir.',
    logo: 'RC'
  },

  uzmanlikHarita: {
    'Web Uygulama Guvenligi': ['web','owasp','burp','appsec'],
    'Ag Sizma Testi': ['network','nmap','pentest','firewall'],
    'Mobil Uygulama Analizi': ['mobile','android','ios','apk'],
    'Red Team Operasyonu': ['redteam','apt','c2','lateral'],
    'IoT Donanim Guvenligi': ['iot','hardware','firmware','embedded'],
    'Sosyal Muhendislik': ['social','phishing','osint'],
  },

  get talepler()    { return JSON.parse(/* legacy */ null; // rc_talepler')    ||'[]'); },
  get raporlar()    { return JSON.parse(/* legacy */ null; // rc_raporlar')    ||'[]'); },
  get ekip()        { return JSON.parse(/* legacy */ null; // rc_ekip')        ||'[]'); },
  get bildirimler() { return JSON.parse(/* legacy */ null; // rc_bildirimler') ||'[]'); },
  get gorevler()    { return JSON.parse(/* legacy */ null; // rc_gorevler')    ||'[]'); },

  save(key, val) { localStorage.setItem('rc_'+key, JSON.stringify(val)); },

  bildirimEkle(tip, baslik, mesaj, meta) {
    const b = this.bildirimler;
    const yeni = { id:'B'+Date.now(), tip, baslik, mesaj, meta:meta||{}, tarih:new Date().toISOString(), okundu:false };
    b.unshift(yeni);
    if(b.length>100) b.splice(100);
    this.save('bildirimler', b);
    localStorage.setItem('rc_son_bildirim', JSON.stringify({...yeni, _ts:Date.now()}));
    return yeni;
  },

  bildirimOku(id) {
    const b = this.bildirimler;
    const i = b.findIndex(x=>x.id===id);
    if(i>=0){b[i].okundu=true; this.save('bildirimler',b);}
  },

  tumunuOku() { this.save('bildirimler', this.bildirimler.map(x=>({...x,okundu:true}))); },
  okunmamisSayi() { return this.bildirimler.filter(x=>!x.okundu).length; },

  talepEkle(veri) {
    const t = this.talepler;
    const id = 'T'+String(t.length+1).padStart(3,'0');
    const talep = { id, ...veri, tarih:new Date().toISOString().slice(0,10), durum:'bekleyen' };
    t.push(talep);
    this.save('talepler', t);
    const atanan = this.otomatikAta(talep);
    this.bildirimEkle('talep','Yeni Talep', talep.ad+' - '+talep.hizmet, { talepId:id });
    return talep;
  },

  talepDurumGuncelle(id, yeniDurum) {
    const t = this.talepler;
    const i = t.findIndex(x=>x.id===id);
    if(i<0) return null;
    t[i].durum = yeniDurum;
    this.save('talepler', t);
    this.bildirimEkle('durum','Durum Guncellendi', t[i].ad+' - '+yeniDurum, { talepId:id });
    return t[i];
  },

  talepSil(id) {
    this.save('talepler', this.talepler.filter(x=>x.id!==id));
    this.save('gorevler', this.gorevler.filter(x=>x.talepId!==id));
  },

  raporKaydet(talepId, icerik, tip) {
    const r = this.raporlar;
    const talep = this.talepler.find(t=>t.id===talepId)||{};
    const id = 'R'+String(r.length+1).padStart(3,'0');
    const rapor = { id, talepId, ad:talep.ad||'', hizmet:talep.hizmet||'', tarih:new Date().toISOString().slice(0,10), icerik, tip:tip||'text' };
    r.push(rapor);
    this.save('raporlar', r);
    this.talepDurumGuncelle(talepId,'tamamlandi');
    const g = this.gorevler;
    const gi = g.findIndex(x=>x.talepId===talepId);
    if(gi>=0){ g[gi].durum='tamamlandi'; g[gi].bitisTarih=new Date().toISOString().slice(0,10); this.save('gorevler',g); }
    this.bildirimEkle('rapor','Rapor Hazirlandi', rapor.ad+' - '+rapor.hizmet, { raporId:id, talepId });
    return rapor;
  },

  raporSil(id) { this.save('raporlar', this.raporlar.filter(x=>x.id!==id)); },

  otomatikAta(talep) {
    const ekip = this.ekip.filter(u => u.durum === 'available');
    if(!ekip.length) return null;
    const hizmetAnahtarlar = this.uzmanlikHarita[talep.hizmet] || [];
    const skorlar = ekip.map(u => {
      const certStr = ((u.cert||[]).join(' ') + ' ' + (u.uzmanlik||[]).join(' ')).toLowerCase();
      const uzmanlikSkoru = hizmetAnahtarlar.reduce((s,k) => s + (certStr.includes(k)?2:0), 0);
      const yukSkoru = -(this.gorevler.filter(g=>g.atananId===u.id&&g.durum==='devam').length);
      return { uye:u, skor: uzmanlikSkoru + yukSkoru };
    });
    skorlar.sort((a,b) => b.skor - a.skor);
    const secilen = skorlar[0]?.uye;
    if(!secilen) return null;
    this.gorevEkle({ talepId:talep.id, atananId:secilen.id, atananAd:secilen.ad, hizmet:talep.hizmet, musteri:talep.ad, durum:'bekleyen', notlar:'', bulgular:'', ilerleme:0 });
    const e = this.ekip;
    const ei = e.findIndex(x=>x.id===secilen.id);
    if(ei>=0){ e[ei].durum='busy'; this.save('ekip',e); }
    this.bildirimEkle('sistem','Is Atandi', talep.hizmet+' -> '+secilen.ad, { talepId:talep.id, atananId:secilen.id });
    return secilen;
  },

  manuelAta(talepId, uyeId) {
    const talep = this.talepler.find(t=>t.id===talepId);
    const uye = this.ekip.find(u=>u.id===uyeId);
    if(!talep||!uye) return false;
    const g = this.gorevler.filter(x=>x.talepId!==talepId);
    this.save('gorevler', g);
    this.gorevEkle({ talepId, atananId:uyeId, atananAd:uye.ad, hizmet:talep.hizmet, musteri:talep.ad, durum:'devam', notlar:'', bulgular:'', ilerleme:0 });
    const e = this.ekip;
    const ei = e.findIndex(x=>x.id===uyeId);
    if(ei>=0){ e[ei].durum='busy'; this.save('ekip',e); }
    this.bildirimEkle('sistem','Manuel Atama', talep.hizmet+' -> '+uye.ad, {talepId, atananId:uyeId});
    return true;
  },

  gorevEkle(veri) {
    const g = this.gorevler;
    const id = 'G'+String(g.length+1).padStart(3,'0');
    g.push({ id, ...veri, baslangicTarih:new Date().toISOString().slice(0,10) });
    this.save('gorevler', g);
    return id;
  },

  gorevGuncelle(id, degisiklikler) {
    const g = this.gorevler;
    const i = g.findIndex(x=>x.id===id);
    if(i<0) return;
    Object.assign(g[i], degisiklikler);
    this.save('gorevler', g);
    if(degisiklikler.durum==='tamamlandi') {
      const e = this.ekip;
      const ei = e.findIndex(u=>u.id===g[i].atananId);
      if(ei>=0){
        const aktif = g.filter(x=>x.atananId===e[ei].id&&x.durum==='devam'&&x.id!==id).length;
        if(!aktif){ e[ei].durum='available'; this.save('ekip',e); }
      }
    }
  },

  uyeEkle(veri) {
    const e = this.ekip;
    const id = 'U'+String(e.length+1).padStart(3,'0');
    e.push({ id, ...veri, kayitTarih:new Date().toISOString().slice(0,10) });
    this.save('ekip', e);
    return id;
  },

  uyeGuncelle(id, degisiklikler) {
    const e = this.ekip;
    const i = e.findIndex(x=>x.id===id);
    if(i>=0){ Object.assign(e[i], degisiklikler); this.save('ekip',e); }
  },

  uyeSil(id) {
    this.save('ekip', this.ekip.filter(u=>u.id!==id));

function giris(){
  const user = document.getElementById('l-user').value.trim();

  if(sonuc.ok){
    mevcutUye = sonuc.uye;

    document.getElementById('app').style.display='block';
    document.getElementById('welcome-text').innerHTML = 'Ho geldiniz, <span>'+mevcutUye.ad+'</span>';

function initials(ad){ return (ad||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function toast(msg, renk){
  renk=renk||'var(--green)';
  const t=document.createElement('div');
  t.className='toast';
  t.style.cssText=`background:var(--bg2);border:.5px solid ${renk};color:${renk}`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
